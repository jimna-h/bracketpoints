<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Deck Ranker</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --primary: #b71c1c;
            --text: #1c1c1e;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 580px; }
        h1 { text-align: center; color: var(--primary); margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #8e8e93; margin-bottom: 30px; }
        
        .stat-row { margin-bottom: 20px; border-bottom: 1px solid #f2f2f7; padding-bottom: 12px; }
        .label-group { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 0.85em; text-transform: uppercase; color: #48484a; }
        .val-display { color: var(--primary); font-size: 1.1em; font-weight: 800; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); margin: 8px 0; }
        
        .flavor-text { font-size: 0.85em; color: #636366; line-height: 1.4; min-height: 2.8em; margin-top: 5px; font-style: italic; }

        .status-bar { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .points-remaining { text-align: center; font-size: 1em; font-weight: 700; padding: 12px; border-radius: 12px; background: #e5e5ea; }
        .points-remaining.error { color: #fff; background: #ff3b30; }
        .points-remaining.success { color: #fff; background: #34c759; }
        
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1em; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { background: #aeaeb2; cursor: not-allowed; }
        
        #result-area { margin-top: 25px; display: none; padding-top: 20px; border-top: 2px solid #f2f2f7; }
        .bracket-badge { display: block; text-align: center; padding: 12px; border-radius: 12px; color: white; font-weight: 800; font-size: 1.2em; margin-bottom: 15px; text-transform: uppercase; }
        
        .b1 { background: #8e8e93; } .b2 { background: #34c759; } .b3 { background: #007aff; } .b4 { background: #5856d6; } .b5 { background: #ff3b30; }
        .desc { font-size: 0.95em; line-height: 1.5; color: #3a3a3c; background: #f9f9fb; padding: 15px; border-radius: 10px; border: 1px solid #efeff4; }
        .norm-note { font-size: 0.75em; color: #8e8e93; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Commander Ranker</h1>
    <p class="subtitle">Max 5 per stat. <strong>10 Points Total Pool.</strong></p>

    <div id="inputs">
        <div class="stat-row">
            <div class="label-group"><span>Expression</span> <span class="val-display" id="v1">0</span></div>
            <input type="range" id="expression" min="0" max="5" value="0" oninput="update()">
            <div id="f1" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Social Fun</span> <span class="val-display" id="v2">0</span></div>
            <input type="range" id="social" min="0" max="5" value="0" oninput="update()">
            <div id="f2" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Do the Thing</span> <span class="val-display" id="v3">0</span></div>
            <input type="range" id="engine" min="0" max="5" value="0" oninput="update()">
            <div id="f3" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Winning</span> <span class="val-display" id="v4">0</span></div>
            <input type="range" id="winning" min="0" max="5" value="0" oninput="update()">
            <div id="f4" class="flavor-text"></div>
        </div>
    </div>

    <div class="status-bar">
        <div id="points-bar" class="points-remaining">Points Used: 0 / 10</div>
        <button id="calc-btn" onclick="submitScores()">Calculate Rank</button>
    </div>

    <div id="result-area">
        <div id="bracket-label" class="bracket-badge"></div>
        <div id="bracket-desc" class="desc"></div>
        <div id="norm-msg" class="norm-note"></div>
    </div>
</div>

<script>
    const flavor = {
        expression: [
            "Purely clinical. No aesthetic or thematic constraints.",
            "Includes 1-2 'pet cards' or flavored basic lands.",
            "Thematic core: Includes matching card frames or specific tribal art.",
            "Strict theme: Cuts efficient staples that clash with the deck's lore.",
            "Aesthetic-first: Every card must share a specific visual style or artist.",
            "Full Vibe: 'Guys Sitting in Chairs.' The deck is a gallery, not a weapon."
        ],
        social: [
            "Cold efficiency. No symmetrical effects or political cards.",
            "Standard interaction. Includes removal to manage the table.",
            "Political tools. Includes Goad, voting, or 'Choice' cards.",
            "Table interaction. Symmetrical draws (Howling Mine) or buffs.",
            "Resource variance. Creates chaotic or unique shared board states.",
            "Social Engine: Faciliates a narrative game over a competitive one."
        ],
        engine: [
            "Aggregated value. No specific engine; just high-quality cards.",
            "Basic synergy. Tribal lords or simple 'if/then' interactions.",
            "Mechanical goal. A clear loop (e.g., Aristocrats or Enchantress).",
            "Complex synergy. Built around a unique, niche commander ability.",
            "Rube Goldberg. Multiple pieces required for explosive value turns.",
            "The Thing: Constructed to 'Do the Thing' regardless of the win-con."
        ],
        winning: [
            "Accidental win-cons. Wins via board presence and 'fair' damage.",
            "High-MV finishers. Includes cards like Craterhoof found naturally.",
            "Dedicated win-cons. Efficient finishers found via minor tutoring.",
            "Combo-reliant. Features 2-3 card infinites and reliable tutors.",
            "Optimized speed. Uses fast mana and 'free' spells to secure wins.",
            "Absolute Efficiency. Built for turn 0-3 victory. No fluff."
        ]
    };

    const brackets = [
        { name: "Bracket 1: Exhibition", class: "b1", desc: "Prioritizes theme/expression. Substandard win-cons. Games expect 9+ turns." },
        { name: "Bracket 2: Core", class: "b2", desc: "Mechanically focused but creative. Low pressure. Games expect 8+ turns." },
        { name: "Bracket 3: Upgraded", class: "b3", desc: "Strong synergy and quality. Proactive/reactive play. Games expect 6+ turns." },
        { name: "Bracket 4: Optimized", class: "b4", desc: "Lethal, fast, and consistent. Explosive threats. Games expect 4+ turns." },
        { name: "Bracket 5: cEDH", class: "b5", desc: "Meticulously designed for the cEDH metagame. Victory prioritized over all else." }
    ];

    function update() {
        const v1 = parseInt(document.getElementById('expression').value);
        const v2 = parseInt(document.getElementById('social').value);
        const v3 = parseInt(document.getElementById('engine').value);
        const v4 = parseInt(document.getElementById('winning').value);

        document.getElementById('v1').innerText = v1;
        document.getElementById('v2').innerText = v2;
        document.getElementById('v3').innerText = v3;
        document.getElementById('v4').innerText = v4;

        document.getElementById('f1').innerText = flavor.expression[v1];
        document.getElementById('f2').innerText = flavor.social[v2];
        document.getElementById('f3').innerText = flavor.engine[v3];
        document.getElementById('f4').innerText = flavor.winning[v4];

        const total = v1 + v2 + v3 + v4;
        const bar = document.getElementById('points-bar');
        const btn = document.getElementById('calc-btn');
        
        bar.innerText = `Points Used: ${total} / 10`;
        
        if (total > 10) {
            bar.className = 'points-remaining error';
            btn.disabled = true;
        } else {
            btn.disabled = total === 0;
            if (total === 10) {
                bar.className = 'points-remaining success';
            } else {
                bar.className = 'points-remaining';
            }
        }
    }

    function submitScores() {
        const e = parseInt(document.getElementById('expression').value);
        const s = parseInt(document.getElementById('social').value);
        const n = parseInt(document.getElementById('engine').value);
        const w = parseInt(document.getElementById('winning').value);
        
        const total = e + s + n + w;
        let ne = e, ns = s, nn = n, nw = w;

        // Normalization
        if (total < 10 && total > 0) {
            const multiplier = 10 / total;
            ne = e * multiplier;
            ns = s * multiplier;
            nn = n * multiplier;
            nw = w * multiplier;
            document.getElementById('norm-msg').innerText = `Deck normalized to a 10pt profile for ranking.`;
        } else {
            document.getElementById('norm-msg').innerText = "";
        }

        calculateBracket(ne, ns, nn, nw);
    }

    function calculateBracket(exp, soc, eng, win) {
        let index = 1;
        
        // Logical mapping for 10-point normalized scale
        if (win >= 4.5) index = 4; 
        else if (win >= 3.5 || (win >= 2.5 && eng >= 4)) index = 3; 
        else if (win >= 1.5 || eng >= 3) index = 2; 
        else if (exp >= 4 || soc >= 4) index = 0; 
        else index = 1; 
        
        const bracket = brackets[index];
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        const label = document.getElementById('bracket-label');
        label.innerText = bracket.name;
        label.className = 'bracket-badge ' + bracket.class;
        document.getElementById('bracket-desc').innerText = bracket.desc;
    }

    update();
</script>

</body>
</html>
