<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Deck Ranker</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --primary: #b71c1c;
            --text: #1c1c1e;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 580px; }
        h1 { text-align: center; color: var(--primary); margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #8e8e93; margin-bottom: 30px; }
        
        .stat-row { margin-bottom: 25px; border-bottom: 1px solid #f2f2f7; padding-bottom: 15px; }
        .label-group { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 0.9em; text-transform: uppercase; color: #48484a; }
        .val-display { color: var(--primary); font-size: 1.1em; background: #fff5f5; padding: 2px 8px; border-radius: 6px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); margin: 10px 0; }
        
        .flavor-text { font-size: 0.9em; color: #636366; line-height: 1.4; min-height: 3em; display: flex; align-items: flex-start; margin-top: 5px; }

        .points-remaining { text-align: center; font-size: 1em; font-weight: 700; margin: 20px 0; padding: 12px; border-radius: 12px; background: #e5e5ea; transition: 0.3s; }
        .points-remaining.error { color: #fff; background: #ff3b30; }
        .points-remaining.success { color: #fff; background: #34c759; }
        
        #result-area { margin-top: 25px; display: none; padding-top: 20px; border-top: 2px solid #f2f2f7; }
        .bracket-badge { display: block; text-align: center; padding: 12px; border-radius: 12px; color: white; font-weight: 800; font-size: 1.2em; margin-bottom: 15px; text-transform: uppercase; }
        
        .b1 { background: #8e8e93; } .b2 { background: #34c759; } .b3 { background: #007aff; } .b4 { background: #5856d6; } .b5 { background: #ff3b30; }
        .desc { font-size: 0.95em; line-height: 1.5; color: #3a3a3c; background: #f9f9fb; padding: 15px; border-radius: 10px; border: 1px solid #efeff4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Commander Ranker</h1>
    <p class="subtitle">Assign 10 points total to define your deck's construction.</p>

    <div id="inputs">
        <div class="stat-row">
            <div class="label-group"><span>Expression (Art/Theme)</span> <span class="val-display" id="v1">0</span></div>
            <input type="range" id="expression" min="0" max="8" value="0" oninput="update()">
            <div id="f1" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Social Fun (Interaction/Politics)</span> <span class="val-display" id="v2">0</span></div>
            <input type="range" id="social" min="0" max="8" value="0" oninput="update()">
            <div id="f2" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Do the Thing (Engine/Synergy)</span> <span class="val-display" id="v3">0</span></div>
            <input type="range" id="engine" min="0" max="8" value="0" oninput="update()">
            <div id="f3" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Winning (Efficiency/Meta)</span> <span class="val-display" id="v4">0</span></div>
            <input type="range" id="winning" min="0" max="8" value="0" oninput="update()">
            <div id="f4" class="flavor-text"></div>
        </div>
    </div>

    <div id="points-bar" class="points-remaining">Points Remaining: 10</div>

    <div id="result-area">
        <div id="bracket-label" class="bracket-badge"></div>
        <div id="bracket-desc" class="desc"></div>
    </div>
</div>

<script>
    const flavor = {
        expression: [
            "Purely clinical. No aesthetic or thematic constraints.",
            "Includes 1-2 'pet cards' or specific printings for flavor.",
            "Visual cohesion: includes themed basics or matching frames.",
            "Mechanical flavor: cards chosen for name/flavor text over utility.",
            "Thematic core: deck is built around a specific lore concept or tribe.",
            "Strict theme: cuts efficient staples that clash with the deck's 'story'.",
            "Aesthetic-first: every card must share a specific visual style.",
            "Extreme constraint: e.g. 'all cards must feature art by one artist'.",
            "Full Vibe: 'Guys Sitting in Chairs.' The deck is a gallery, not a weapon."
        ],
        social: [
            "Cold efficiency. No symmetrical effects or political cards.",
            "Standard interaction (removal/counters) to manage the board.",
            "Includes 'fair' cards that give opponents choices (Fact or Fiction).",
            "Political tools: includes Goad, curses, or voting mechanics.",
            "Table interaction: includes 'Group Hug' cards like Howling Mine.",
            "Resource variance: includes cards that create chaotic board states.",
            "Game extension: deck is built to keep everyone in the game longer.",
            "Pure diplomacy: deck focuses on symmetrical buffs and gifts.",
            "Social Engine: The deck exists to facilitate a shared table experience."
        ],
        engine: [
            "Aggregated value. No specific engine; just powerful individual cards.",
            "Basic synergy. Tribal lords or simple 'if/then' interactions.",
            "Mechanical goal. A clear loop (e.g. aristocrats or enchantress).",
            "Mid-range engine. Dedicated slots for draw/ramp that fuel a payoff.",
            "Complex synergy. Deck is built around a specific, unique commander ability.",
            "High-resource engine. Generates massive mana/cards if not disrupted.",
            "Rube Goldberg machine. Multiple pieces required for an explosive 'thing'.",
            "Non-deterministic engine. Long turns spent generating incremental value.",
            "The Engine IS the Deck. Constructed to 'Do the Thing' regardless of victory."
        ],
        winning: [
            "Accidental win-cons. No dedicated finishers or tutors.",
            "Combat-focused. Wins via board presence and 'fair' damage.",
            "High-MV finishers. Includes cards like Craterhoof or Insurrection.",
            "Telegraphed finishers. Wins are visible on-board 1-2 turns away.",
            "Dedicated win-cons. Efficient finishers found via minor tutoring.",
            "Combo-reliant. Features 2-3 card infinites with standard tutors.",
            "Optimized speed. Uses fast mana and 'free' spells to secure wins.",
            "cEDH Standard. Plays meta-defining combos (Thoracle/Breach).",
            "Absolute Efficiency. Built for turn 0-3 victory/lockout. No fluff."
        ]
    };

    const brackets = [
        { name: "Bracket 1: Exhibition", class: "b1", desc: "Prioritizes theme/expression. Substandard win-cons. Games expect 9+ turns. No 2-card combos." },
        { name: "Bracket 2: Core", class: "b2", desc: "Mechanically focused but creative. Low pressure. Games expect 8+ turns. Win-cons are telegraphed." },
        { name: "Bracket 3: Upgraded", class: "b3", desc: "Strong synergy and card quality. Proactive/reactive play. Games expect 6+ turns. Combos delayed." },
        { name: "Bracket 4: Optimized", class: "b4", desc: "Lethal, fast, and consistent. Explosive threats. Games expect 4+ turns. No deck restrictions." },
        { name: "Bracket 5: cEDH", class: "b5", desc: "Meticulously designed for the cEDH metagame. Victory prioritized over all else. Intricate play." }
    ];

    function update() {
        const v1 = parseInt(document.getElementById('expression').value);
        const v2 = parseInt(document.getElementById('social').value);
        const v3 = parseInt(document.getElementById('engine').value);
        const v4 = parseInt(document.getElementById('winning').value);

        document.getElementById('v1').innerText = v1;
        document.getElementById('v2').innerText = v2;
        document.getElementById('v3').innerText = v3;
        document.getElementById('v4').innerText = v4;

        document.getElementById('f1').innerText = flavor.expression[v1];
        document.getElementById('f2').innerText = flavor.social[v2];
        document.getElementById('f3').innerText = flavor.engine[v3];
        document.getElementById('f4').innerText = flavor.winning[v4];

        const total = v1 + v2 + v3 + v4;
        const remaining = 10 - total;
        const bar = document.getElementById('points-bar');
        const resArea = document.getElementById('result-area');

        if (remaining < 0) {
            bar.className = 'points-remaining error';
            bar.innerText = `Over Limit by ${Math.abs(remaining)}!`;
            resArea.style.display = 'none';
        } else if (remaining > 0) {
            bar.className = 'points-remaining';
            bar.innerText = `Points Remaining: ${remaining}`;
            resArea.style.display = 'none';
        } else {
            bar.className = 'points-remaining success';
            bar.innerText = `Profile Complete!`;
            calculateBracket(v1, v2, v3, v4);
        }
    }

    function calculateBracket(exp, soc, eng, win) {
        let index = 1;
        
        // Weight-based mapping for the 10-point limited pool
        if (win >= 7) index = 4; // cEDH focus
        else if (win >= 5 || (win >= 4 && eng >= 4)) index = 3; // Optimized focus
        else if (win >= 3 || eng >= 5) index = 2; // Upgraded focus
        else if (exp >= 5 || soc >= 5) index = 0; // Theme/Social focus
        else index = 1; // Balanced/Core focus
        
        const bracket = brackets[index];
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        const label = document.getElementById('bracket-label');
        label.innerText = bracket.name;
        label.className = 'bracket-badge ' + bracket.class;
        document.getElementById('bracket-desc').innerText = bracket.desc;
    }

    update();
</script>

</body>
</html>
