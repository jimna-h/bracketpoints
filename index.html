<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander Deck Ranker</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --primary: #b71c1c;
            --text: #1c1c1e;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 580px; }
        h1 { text-align: center; color: var(--primary); margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #8e8e93; margin-bottom: 30px; }
        
        .stat-row { margin-bottom: 25px; border-bottom: 1px solid #f2f2f7; padding-bottom: 15px; }
        .label-group { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 0.85em; text-transform: uppercase; color: #48484a; }
        .val-display { color: var(--primary); font-size: 1.1em; font-weight: 800; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); margin: 8px 0; }
        
        .flavor-text { font-size: 0.9em; color: #555; line-height: 1.4; min-height: 3.2em; margin-top: 5px; font-style: italic; border-left: 3px solid #eee; padding-left: 10px; display: flex; align-items: center; }

        .status-bar { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .points-remaining { text-align: center; font-size: 1em; font-weight: 700; padding: 12px; border-radius: 12px; background: #e5e5ea; }
        .points-remaining.error { color: #fff; background: #ff3b30; }
        .points-remaining.success { color: #fff; background: #34c759; }
        
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1.1em; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(183, 28, 28, 0.2); }
        button:disabled { background: #aeaeb2; cursor: not-allowed; box-shadow: none; }
        button:active { transform: scale(0.98); }

        #result-area { margin-top: 25px; display: none; padding-top: 25px; border-top: 3px double #f2f2f7; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bracket-badge { display: block; text-align: center; padding: 15px; border-radius: 12px; color: white; font-weight: 900; font-size: 1.4em; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .b1 { background: #8e8e93; } .b2 { background: #34c759; } .b3 { background: #007aff; } .b4 { background: #5856d6; } .b5 { background: #ff3b30; }
        .desc { font-size: 1em; line-height: 1.6; color: #3a3a3c; background: #f9f9fb; padding: 20px; border-radius: 12px; border: 1px solid #efeff4; }
        .norm-note { font-size: 0.8em; color: #8e8e93; margin-top: 15px; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>Commander Ranker</h1>
    <p class="subtitle">Max 5 per stat. Spend up to 10 points total.</p>

    <div id="inputs">
        <div class="stat-row">
            <div class="label-group"><span>Expression</span> <span class="val-display" id="v1">0</span></div>
            <input type="range" id="expression" min="0" max="5" value="0" oninput="update()">
            <div id="f1" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Social Fun</span> <span class="val-display" id="v2">0</span></div>
            <input type="range" id="social" min="0" max="5" value="0" oninput="update()">
            <div id="f2" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Do the Thing</span> <span class="val-display" id="v3">0</span></div>
            <input type="range" id="engine" min="0" max="5" value="0" oninput="update()">
            <div id="f3" class="flavor-text"></div>
        </div>
        <div class="stat-row">
            <div class="label-group"><span>Winning</span> <span class="val-display" id="v4">0</span></div>
            <input type="range" id="winning" min="0" max="5" value="0" oninput="update()">
            <div id="f4" class="flavor-text"></div>
        </div>
    </div>

    <div class="status-bar">
        <div id="points-bar" class="points-remaining">Points Used: 0 / 10</div>
        <button id="calc-btn" onclick="submitScores()">Analyze Deck Bracket</button>
    </div>

    <div id="result-area">
        <div id="bracket-label" class="bracket-badge"></div>
        <div id="bracket-desc" class="desc"></div>
        <div id="norm-msg" class="norm-note"></div>
    </div>
</div>

<script>
    const flavor = {
        expression: [
            "Purely functional. Art and flavor have zero impact on card choice.",
            "I have a few favorite printings, but power always comes first.",
            "Visual cohesion: Includes matching basic lands or specific card frames.",
            "Theme-driven: I'll choose a similar effect over a better card because of the art.",
            "Strict commitment: I won't play efficient staples if they ruin the deck's lore.",
            "Full Vibe: This is my 'Guys Sitting in Chairs' deck! Perfection over power."
        ],
        social: [
            "Cold efficiency. No symmetrical effects or political cards in the 99.",
            "Standard interaction: Includes typical removal to manage the board.",
            "Includes cards that create choices, like Fact or Fiction or Council's Judgment.",
            "Political tools: Includes Goad, voting, or symmetrical draws like Howling Mine.",
            "Resource variance: The deck is built to create chaotic or unique shared board states.",
            "Social Engine: The deck exists to facilitate a memorable story for the whole table."
        ],
        engine: [
            "Aggregated value. No specific engine; just powerful individual cards.",
            "Basic synergy. Standard tribal lords or simple 'if/then' interactions.",
            "Mechanical goal. A clear loop, like an Aristocrats or Enchantress engine.",
            "Complex synergy. The deck revolves entirely around a unique Commander ability.",
            "Rube Goldberg machine. Multiple pieces required for an explosive, unique 'Thing'.",
            "The Engine IS the Deck: I'll spend 20 minutes on a turn just to see the engine run."
        ],
        winning: [
            "Accidental win-cons. I might win via 'fair' combat if the game lasts 15 turns.",
            "Telegraphed finishers. Wins via board presence or high-MV spells like Insurrection.",
            "Dedicated finishers. Efficient win conditions found via minor tutoring.",
            "Combo-reliant. Features 2-3 card infinites and reliable, efficient tutors.",
            "Optimized speed. Uses fast mana and 'free' spells to secure wins by turns 4-5.",
            "Absolute Efficiency. A top-tier list designed for turn 0-3 victory or lockout."
        ]
    };

    const brackets = [
        { name: "Bracket 1: Exhibition", class: "b1", desc: "Prioritizes theme and expression over power. Win conditions are thematic or substandard. Expect games to last 9+ turns." },
        { name: "Bracket 2: Core", class: "b2", desc: "Mechanically focused but creative. Low pressure, proactive gameplay. Win conditions are usually telegraphed. Expect 8+ turns." },
        { name: "Bracket 3: Upgraded", class: "b3", desc: "Strong synergy and high card quality. Many proactive and reactive plays. Can disrupt opponents effectively. Expect 6+ turns." },
        { name: "Bracket 4: Optimized", class: "b4", desc: "Lethal, consistent, and fast. Explosive threats and efficient disruption. No restricted card types. Expect 4+ turns." },
        { name: "Bracket 5: cEDH", class: "b5", desc: "Meticulously designed for the cEDH metagame. Maximum efficiency and victory over all else. Games can end on any turn." }
    ];

    function update() {
        const vals = [
            parseInt(document.getElementById('expression').value),
            parseInt(document.getElementById('social').value),
            parseInt(document.getElementById('engine').value),
            parseInt(document.getElementById('winning').value)
        ];

        vals.forEach((v, i) => {
            document.getElementById(`v${i+1}`).innerText = v;
            document.getElementById(`f${i+1}`).innerText = flavor[Object.keys(flavor)[i]][v];
        });

        const total = vals.reduce((a, b) => a + b, 0);
        const bar = document.getElementById('points-bar');
        const btn = document.getElementById('calc-btn');
        
        bar.innerText = `Points Used: ${total} / 10`;
        
        if (total > 10) {
            bar.className = 'points-remaining error';
            btn.disabled = true;
        } else if (total === 10) {
            bar.className = 'points-remaining success';
            btn.disabled = false;
        } else {
            bar.className = 'points-remaining';
            btn.disabled = total === 0;
        }
    }

    function submitScores() {
        const e = parseInt(document.getElementById('expression').value);
        const s = parseInt(document.getElementById('social').value);
        const n = parseInt(document.getElementById('engine').value);
        const w = parseInt(document.getElementById('winning').value);
        
        const total = e + s + n + w;
        let ne = e, ns = s, nn = n, nw = w;

        if (total < 10 && total > 0) {
            const multiplier = 10 / total;
            ne = e * multiplier;
            ns = s * multiplier;
            nn = n * multiplier;
            nw = w * multiplier;
            document.getElementById('norm-msg').innerText = `Deck profile normalized from ${total} to 10 points for ranking.`;
        } else {
            document.getElementById('norm-msg').innerText = "";
        }

        calculateBracket(ne, ns, nn, nw);
    }

    function calculateBracket(exp, soc, eng, win) {
        let index = 1;
        
        // Threshold Logic using normalized values (out of 10)
        if (win >= 4.5) index = 4; // cEDH
        else if (win >= 3.2 || (win >= 2.2 && eng >= 4.2)) index = 3; // Optimized
        else if (win >= 1.5 || eng >= 2.8) index = 2; // Upgraded
        else if (exp >= 4.5 || soc >= 4.5) index = 0; // Exhibition
        else index = 1; // Core
        
        const bracket = brackets[index];
        const resArea = document.getElementById('result-area');
        resArea.style.display = 'block';
        
        const label = document.getElementById('bracket-label');
        label.innerText = bracket.name;
        label.className = 'bracket-badge ' + bracket.class;
        document.getElementById('bracket-desc').innerText = bracket.desc;
        
        resArea.scrollIntoView({ behavior: 'smooth' });
    }

    update();
</script>

</body>
</html>
